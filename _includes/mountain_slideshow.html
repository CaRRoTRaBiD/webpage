<div style="position:relative; margin: 1.5rem 0; border-radius: 6px; background:#1a1a1a; display:flex; align-items:center; justify-content:center; min-height:200px;">
  <img id="mtn-img" src="/assets/img/mountains/mountain_1.jpg" style="max-width:100%; max-height:75vh; width:auto; height:auto; display:block; border-radius:6px;">
  <button id="mtn-prev" style="position:absolute; left:8px; top:50%; transform:translateY(-50%); width:40px; height:40px; border-radius:50%; background:rgba(0,0,0,0.55); border:none; color:#fff; font-size:1.4rem; cursor:pointer; line-height:1; z-index:10;">&#8249;</button>
  <button id="mtn-next" style="position:absolute; right:8px; top:50%; transform:translateY(-50%); width:40px; height:40px; border-radius:50%; background:rgba(0,0,0,0.55); border:none; color:#fff; font-size:1.4rem; cursor:pointer; line-height:1; z-index:10;">&#8250;</button>
  <div style="position:absolute; bottom:8px; width:100%; text-align:center; color:rgba(255,255,255,0.6); font-size:0.75rem; pointer-events:none;"><span id="mtn-counter">1 / 10</span></div>
</div>

<script>
(function () {
  var photos = [
    "/assets/img/mountains/mountain_1.jpg",
    "/assets/img/mountains/mountain_2.jpg",
    "/assets/img/mountains/mountain_3.jpg",
    "/assets/img/mountains/mountain_4.jpg",
    "/assets/img/mountains/mountain_5.jpg",
    "/assets/img/mountains/mountain_6.jpg",
    "/assets/img/mountains/mountain_7.jpg",
    "/assets/img/mountains/mountain_8.jpg",
    "/assets/img/mountains/mountain_9.jpg",
    "/assets/img/mountains/mountain_10.jpg"
  ];
  var idx = 0;
  function show(n) {
    idx = (n + photos.length) % photos.length;
    document.getElementById("mtn-img").src = photos[idx];
    document.getElementById("mtn-counter").textContent = (idx + 1) + " / " + photos.length;
  }
  document.getElementById("mtn-prev").addEventListener("click", function (e) { e.stopPropagation(); show(idx - 1); });
  document.getElementById("mtn-next").addEventListener("click", function (e) { e.stopPropagation(); show(idx + 1); });
})();
</script>
